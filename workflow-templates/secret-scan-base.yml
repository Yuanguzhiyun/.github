name: secret scan
# Yuanguzhiyun org template — runs on self-hosted [racknerd] by default.
# 用 MIT-licensed gitleaks binary (避开 gitleaks-action@v2 的 org-level 商业 license);
# 同 mmm-toolchain / fp-manage 现行实施模式。
on: [push, pull_request]
permissions:
  contents: read
  pull-requests: read
concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true
jobs:
  gitleaks:
    runs-on: [self-hosted, racknerd]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install gitleaks binary (latest release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release download --repo gitleaks/gitleaks \
            --pattern 'gitleaks_*_linux_x64.tar.gz' \
            --output /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/ gitleaks
          chmod +x /tmp/gitleaks
          /tmp/gitleaks version
      - name: gitleaks detect (full git history; --redact 防 secret 进 log)
        run: /tmp/gitleaks detect --source . --redact --verbose --exit-code 1
