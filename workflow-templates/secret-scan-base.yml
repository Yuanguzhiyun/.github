name: secret scan
# Yuanguzhiyun org template — runs on self-hosted [racknerd] by default.
#
# ⚠️ Trust boundary 依赖（consumer repo 必须满足，否则不要用本模板）：
#   1. private repo（仅 org collaborator 可访问）
#   2. org Actions Settings 已设 "Require approval for fork pull request workflows"
#      （Phase 9.0-A 已配；防 first-time contributor / fork 任意 workflow 直接命中 self-hosted runner）
#   3. org workflow `default_workflow_permissions=read`（Phase 9.0-B 已配；GITHUB_TOKEN 默认只读）
#   4. workflow `permissions:` 显式声明所需权限（最小特权）
# 不满足上述条件（如 fork-friendly public repo / 不受信 collaborator）必须改用 ubuntu-hosted 或
# ephemeral runner / per-job container，不要复用本模板。
#
# 用 MIT-licensed gitleaks binary（避开 gitleaks-action@v2 的 org-level 商业 license）；
# 同 mmm-toolchain / fp-manage 现行实施模式。
on: [push, pull_request]
permissions:
  contents: read
  pull-requests: read
concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true
jobs:
  gitleaks:
    runs-on: [self-hosted, racknerd]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install gitleaks binary (latest release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release download --repo gitleaks/gitleaks \
            --pattern 'gitleaks_*_linux_x64.tar.gz' \
            --output /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/ gitleaks
          chmod +x /tmp/gitleaks
          /tmp/gitleaks version
      - name: gitleaks detect (full git history; --redact 防 secret 进 log)
        run: /tmp/gitleaks detect --source . --redact --verbose --exit-code 1
