name: Python CI
# Yuanguzhiyun org template — runs on self-hosted [racknerd] by default.
#
# ⚠️ Trust boundary 依赖（consumer repo 必须满足，否则不要用本模板）：
#   1. private repo（仅 org collaborator 可访问）
#   2. org Actions Settings 已设 "Require approval for fork pull request workflows"
#   3. org workflow `default_workflow_permissions=read`
#   4. workflow `permissions:` 显式声明所需权限（最小特权）
# 不满足上述条件（如 fork-friendly public repo / 不受信 collaborator）必须改用 ubuntu-hosted 或
# ephemeral runner / per-job container，不要复用本模板。
#
# 用 astral-sh/setup-uv@v3 装 uv（fast Python package manager），与 fp-manage 现行模式一致。
on: [push, pull_request]
permissions:
  contents: read
concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint-and-test:
    runs-on: [self-hosted, racknerd]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Tests (pytest)
        run: uv run pytest -v
