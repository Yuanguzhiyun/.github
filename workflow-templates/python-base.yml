name: Python CI
# Yuanguzhiyun org template — runs on self-hosted [racknerd] by default.
# 用 astral-sh/setup-uv@v3 装 uv（fast Python package manager），与 fp-manage 现行模式一致。
on: [push, pull_request]
permissions:
  contents: read
concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint-and-test:
    runs-on: [self-hosted, racknerd]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Tests (pytest)
        run: uv run pytest -v
